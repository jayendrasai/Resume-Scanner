server {
    listen 80;

    # Railway/Docker internal DNS resolver
    # It tells Nginx to use the internal DNS to find your backend.
    #resolver 127.0.0.11 valid=30s;

    # 1. Serve the React Frontend
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Crucial for React Router (prevents 404s on refresh)
        try_files $uri $uri/ /index.html; 
    }

    # 2. Proxy API requests to the Python Backend Container
    location /api/ {
        # IMPORTANT: use variable for Railway dynamic DNS
        #set $backend http://scanner-backend:8000;
        # Replace 'backend' with your actual Railway service name
        #proxy_pass $backend;


        # 'backend' resolves to the docker-compose service name
        proxy_pass http://backend:8000/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Add these to prevent the 504 timeouts if the AI processing takes time
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }
}